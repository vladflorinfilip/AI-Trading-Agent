kraken:
  cli_binary: ./kraken
  paper_mode: true
  default_currency: USD
  paper_starting_balance: 10000.0

gemini:
  model: gemini-3.1-flash-lite-preview
  use_vertex: false
  temperature: 1.0
  max_output_tokens: 65535

trading:
  pairs:
    - BTC/USD
    - ETH/USD

agent:
  max_iterations: 20
  log_level: INFO
