kraken:
  paper_mode: true
  default_currency: USD
  paper_starting_balance: 10000.0

gemini:
  model: gemini-3.1-flash-lite-preview
  use_vertex: false
  temperature: 1.0
  max_output_tokens: 65535

mistral:
  model: mistral-medium-latest
  temperature: 0.7
  max_output_tokens: 2048

trading:
  pairs:
    - BTC/USD
    - ETH/USD
    - SOL/USD
    - XRP/USD
    - BNB/USD
    - POL/USD

identity:
  chain: sepolia
  deadline_buffer_seconds: 300
  default_max_slippage_bps: 50

risk_router:
  max_position_usd: 1000.0          # max single trade size in USD
  max_slippage_bps: 200             # 2.0% absolute ceiling on requested slippage
  allowed_markets:
    - XBTUSD
    - ETHUSD
    - SOLUSD
    - XRPUSD
    - BNBUSD
    - POLUSD
  leverage_caps:                    # 1 = spot only; raise when margin trading enabled
    XBTUSD: 1
    ETHUSD: 1
    SOLUSD: 1
    XRPUSD: 1
    BNBUSD: 1
    POLUSD: 1
  whitelisted_routes:               # tried in order; first entry is preferred
    - kraken_spot
    - uniswap_v3
    - 1inch_v5

agent:
  llm_provider: mistral
  max_iterations: 20
  min_trade_usd: 50.0
  log_level: INFO
